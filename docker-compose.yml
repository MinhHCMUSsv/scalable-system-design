version: '3.8'

services:
  # 1. Database Master
  pg_master:
    image: bitnami/postgresql:latest
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=admin
      - POSTGRESQL_PASSWORD=admin123
      - POSTGRESQL_DATABASE=shop_db
    ports:
      - "5432:5432"

  # 2. Database Slave
  pg_slave:
    image: bitnami/postgresql:latest
    depends_on:
      - pg_master
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_MASTER_HOST=pg_master
      - POSTGRESQL_USERNAME=admin
      - POSTGRESQL_PASSWORD=admin123
    ports:
      - "5433:5432"

  # 3. API Node 1
  api_node_1:
    build: ./api
    depends_on:
      - pg_master
      - pg_slave
    environment:
      - SERVER_ID=Node_1
      - DB_MASTER_HOST=pg_master
      - DB_SLAVE_HOST=pg_slave
      - DB_USER=admin
      - DB_PASSWORD=admin123
      - DB_NAME=shop_db
    ports:
      - "3001:3000"

  # 4. API Node 2
  api_node_2:
    build: ./api
    depends_on:
      - pg_master
      - pg_slave
    environment:
      - SERVER_ID=Node_2
      - DB_MASTER_HOST=pg_master
      - DB_SLAVE_HOST=pg_slave
      - DB_USER=admin
      - DB_PASSWORD=admin123
      - DB_NAME=shop_db
    ports:
      - "3002:3000"

  # 5. Load Balancer Nginx
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_node_1
      - api_node_2
    ports:
      - "8080:80"